name: Daily ZNS Reminder

on:
  schedule:
    # Chạy mỗi ngày lúc 8:00 AM (UTC+7 = 1:00 AM UTC)
    - cron: '0 1 * * *'
  
  # Cho phép trigger thủ công
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run daily reminder
        env:
          KIOTVIET_ACCESS_TOKEN: ${{ secrets.KIOTVIET_ACCESS_TOKEN }}
          KIOTVIET_RETAILER: ${{ secrets.KIOTVIET_RETAILER }}
          ZNS_API_KEY: ${{ secrets.ZNS_API_KEY }}
          ZNS_TEMPLATE_ID: ${{ secrets.ZNS_TEMPLATE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DRY_RUN: false
        run: npm run daily
