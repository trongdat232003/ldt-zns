name: Daily ZNS Reminder

on:
  # Cho phép trigger thủ công
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run daily reminder
        env:
          KIOTVIET_CLIENT_ID: ${{ secrets.KIOTVIET_CLIENT_ID }}
          KIOTVIET_CLIENT_SECRET: ${{ secrets.KIOTVIET_CLIENT_SECRET }}
          KIOTVIET_RETAILER: ${{ secrets.KIOTVIET_RETAILER }}
          ZNS_API_KEY: ${{ secrets.ZNS_API_KEY }}
          ZNS_TEMPLATE_ID: ${{ secrets.ZNS_TEMPLATE_ID }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DRY_RUN: false
        run: npm run worker:run
