# Last updated: 2024-01-17
name: ZNS Auto Reminder Daily

on:
  schedule:
    # 🧪 TEST MODE: Chạy mỗi 5 phút (GitHub Actions minimum)
    - cron: '*/5 * * * *'
    
    # 🚀 PRODUCTION: Chạy lúc 2:00 AM UTC = 9:00 AM VN (UTC+7)
    # Khi chuyển production: comment dòng trên, uncomment dòng dưới
    # - cron: '0 2 * * *'
  
  # Cho phép chạy thủ công
  workflow_dispatch:

  # Push trigger để giữ workflow active
  push:
    branches:
      - main
      - master
    paths:
      - '.github/workflows/daily-zns-reminder.yml'

jobs:
  send-zns-reminders:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        run: npm install
      
      # Clean log for testing only - REMOVE IN PRODUCTION
      # - name: Clean log (for testing)
      #   run: rm -f simple_reminder_log.json
      
      - name: Run ZNS Auto Reminder
        env:
          ZNS_API_KEY: ${{ secrets.ZNS_API_KEY }}
          ZNS_TEMPLATE_ID: ${{ secrets.ZNS_TEMPLATE_ID }}
          KIOTVIET_ACCESS_TOKEN: ${{ secrets.KIOTVIET_ACCESS_TOKEN }}
          KIOTVIET_RETAILER: ${{ secrets.KIOTVIET_RETAILER }}
          MINUTES_SINCE_PURCHASE: ${{ secrets.MINUTES_SINCE_PURCHASE }}
          MINUTES_BETWEEN_REMINDERS: ${{ secrets.MINUTES_BETWEEN_REMINDERS }}
          MAX_SEND_PER_RUN: ${{ secrets.MAX_SEND_PER_RUN }}
          DRY_RUN: ${{ secrets.DRY_RUN }}
          USE_MOCK_DATA: ${{ secrets.USE_MOCK_DATA }}
        run: node runDaily.js
